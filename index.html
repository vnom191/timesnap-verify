<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TimeSnap Verify</title>
<style>
:root {
  --bg: #f5f7fb;
  --bg-elev: #ffffff;
  --bg-soft: #f0f3f9;
  --border: #e4e8f0;
  --border-soft: #edf0f5;
  --text: #0f172a;
  --text-soft: #64748b;
  --text-muted: #94a3b8;
  --accent: #0f766e;
  --accent-2: #0284c7;
  --success: #059669;
  --success-bg: #ecfdf5;
  --success-border: #a7f3d0;
  --warning: #d97706;
  --warning-bg: #fffbeb;
  --warning-border: #fcd34d;
  --error: #dc2626;
  --error-bg: #fef2f2;
  --error-border: #fecaca;
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
  --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.06);
}
[data-theme="dark"] {
  --bg: #0a0e1a;
  --bg-elev: #0f1421;
  --bg-soft: #131828;
  --border: #1e2536;
  --border-soft: #182035;
  --text: #f1f5f9;
  --text-soft: #94a3b8;
  --text-muted: #64748b;
  --accent: #14b8a6;
  --accent-2: #0ea5e9;
  --success: #10b981;
  --success-bg: rgba(16, 185, 129, 0.08);
  --success-border: rgba(16, 185, 129, 0.25);
  --warning: #f59e0b;
  --warning-bg: rgba(245, 158, 11, 0.08);
  --warning-border: rgba(245, 158, 11, 0.25);
  --error: #ef4444;
  --error-bg: rgba(239, 68, 68, 0.08);
  --error-border: rgba(239, 68, 68, 0.25);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  transition: background 0.3s, color 0.3s;
}

.nav {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.nav-brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 17px; }
.nav-logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 800; font-size: 15px;
}
.theme-btn {
  width: 40px; height: 40px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg-soft);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}

.container { max-width: 780px; margin: 0 auto; padding: 40px 24px 80px; }

.hero { text-align: center; margin-bottom: 32px; }
.hero-tag {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px;
  border-radius: 999px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  color: var(--accent);
  font-size: 12px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  margin-bottom: 18px;
}
.hero-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
.hero h1 { font-size: 40px; font-weight: 800; letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 12px; }
.hero p { color: var(--text-soft); font-size: 15px; max-width: 500px; margin: 0 auto; line-height: 1.6; }

.card {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px;
  box-shadow: var(--shadow-md);
}

.tabs {
  display: flex; gap: 6px;
  background: var(--bg-soft);
  padding: 5px;
  border-radius: 12px;
  margin-bottom: 24px;
}
.tab {
  flex: 1; padding: 12px;
  background: transparent; border: none;
  color: var(--text-soft);
  font-size: 13px; font-weight: 700;
  cursor: pointer;
  border-radius: 8px;
  font-family: inherit;
  transition: all 0.2s;
}
.tab.active { background: var(--bg-elev); color: var(--text); box-shadow: var(--shadow-sm); }

.panel { display: none; }
.panel.active { display: block; }

.drop {
  display: block;
  border: 2px dashed var(--border);
  background: var(--bg-soft);
  border-radius: 14px;
  padding: 48px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
}
.drop:hover, .drop.drag { border-color: var(--accent); background: var(--bg-elev); }
.drop input[type="file"] { position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px; }
.drop-icon {
  width: 60px; height: 60px;
  margin: 0 auto 14px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 26px;
}
.drop-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.drop-sub { color: var(--text-soft); font-size: 13px; }

.label {
  display: block; font-size: 11px; color: var(--text-soft);
  margin-bottom: 10px; font-weight: 700;
  letter-spacing: 1.8px; text-transform: uppercase;
}
.input {
  width: 100%; padding: 18px 20px;
  background: var(--bg-soft);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 20px;
  font-family: "SF Mono", Monaco, monospace;
  letter-spacing: 3px;
  text-align: center;
  text-transform: uppercase;
}
.input:focus { outline: none; border-color: var(--accent); }

.btn {
  width: 100%; padding: 16px;
  margin-top: 16px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: white; border: none;
  border-radius: 12px;
  font-size: 14px; font-weight: 800;
  letter-spacing: 1px; cursor: pointer;
  text-transform: uppercase;
  font-family: inherit;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.progress {
  margin-top: 20px; padding: 18px;
  background: var(--bg-soft);
  border-radius: 12px;
  display: none;
}
.progress.active { display: block; }
.progress-top { display: flex; justify-content: space-between; margin-bottom: 10px; }
.progress-label { font-size: 13px; font-weight: 600; }
.progress-pct { font-size: 13px; color: var(--accent); font-weight: 700; }
.progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); width: 0%; transition: width 0.3s; }
.progress-status { margin-top: 8px; font-size: 12px; color: var(--text-soft); }

.result { margin-top: 24px; display: none; }
.result.show { display: block; }

.preview {
  margin-bottom: 20px;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--bg-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  max-height: 500px;
}
.preview img { max-width: 100%; max-height: 500px; object-fit: contain; display: block; }

.verdict {
  padding: 20px 24px;
  border-radius: 14px;
  margin-bottom: 20px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.verdict.success { background: var(--success-bg); border: 1px solid var(--success-border); }
.verdict.warning { background: var(--warning-bg); border: 1px solid var(--warning-border); }
.verdict.error { background: var(--error-bg); border: 1px solid var(--error-border); }
.verdict-icon {
  width: 42px; height: 42px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: white; font-weight: 800; flex-shrink: 0;
}
.verdict.success .verdict-icon { background: var(--success); }
.verdict.warning .verdict-icon { background: var(--warning); }
.verdict.error .verdict-icon { background: var(--error); }
.verdict-title { font-size: 17px; font-weight: 800; margin-bottom: 3px; }
.verdict.success .verdict-title { color: var(--success); }
.verdict.warning .verdict-title { color: var(--warning); }
.verdict.error .verdict-title { color: var(--error); }
.verdict-msg { color: var(--text-soft); font-size: 13px; line-height: 1.6; }

.details-title {
  font-size: 12px; color: var(--text-soft);
  letter-spacing: 2px; text-transform: uppercase;
  font-weight: 800; margin-bottom: 14px;
  padding-bottom: 10px; border-bottom: 1px solid var(--border);
}

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.cell {
  padding: 14px 16px;
  background: var(--bg-soft);
  border: 1px solid var(--border-soft);
  border-radius: 10px;
}
.cell-label {
  font-size: 11px; color: var(--text-soft);
  letter-spacing: 1.2px; text-transform: uppercase;
  font-weight: 700; margin-bottom: 4px;
}
.cell-value { font-size: 14px; font-weight: 600; word-break: break-word; }
.cell.wide { grid-column: 1 / -1; }

.map {
  height: 240px; border-radius: 12px;
  overflow: hidden; border: 1px solid var(--border);
  margin-top: 8px;
}
.map iframe { width: 100%; height: 100%; border: 0; }
[data-theme="dark"] .map iframe { filter: invert(0.92) hue-rotate(180deg); }

.warning-box {
  margin-top: 14px; padding: 14px 18px;
  background: var(--warning-bg);
  border-left: 4px solid var(--warning);
  border-radius: 8px;
  color: var(--warning);
  font-size: 13px; line-height: 1.6;
}
.warning-box strong { display: block; margin-bottom: 3px; font-size: 14px; }

.footer {
  text-align: center; margin-top: 32px;
  color: var(--text-muted); font-size: 11px;
  letter-spacing: 1.5px; text-transform: uppercase;
}
.footer a { color: var(--accent); text-decoration: none; }

@media (max-width: 640px) {
  .grid { grid-template-columns: 1fr; }
  .hero h1 { font-size: 30px; }
  .card { padding: 20px; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <div class="nav-logo">TS</div>
    <span>TimeSnap Verify</span>
  </div>
  <button class="theme-btn" id="themeBtn" title="Toggle theme">🌙</button>
</nav>

<div class="container">
  <div class="hero">
    <div class="hero-tag"><span class="hero-dot"></span>Verification Portal</div>
    <h1>Authenticate any TimeSnap</h1>
    <p>Upload a photo or enter a verification code to confirm the exact date, time, and location it was captured.</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" data-tab="upload" type="button">Upload Photo</button>
      <button class="tab" data-tab="code" type="button">Enter Code</button>
    </div>

    <div class="panel active" id="panel-upload">
      <label class="drop" for="tsvFile" id="tsvDrop">
        <div class="drop-icon">↑</div>
        <div class="drop-title">Drop a photo or click to browse</div>
        <div class="drop-sub">Scanner reads codes at any angle or rotation</div>
        <input type="file" id="tsvFile" accept="image/*" />
      </label>
    </div>

    <div class="panel" id="panel-code">
      <label class="label">Verification Code</label>
      <input type="text" id="tsvCode" class="input" placeholder="TS-XXXXXXX" maxlength="10" autocomplete="off" spellcheck="false" />
      <button class="btn" id="tsvVerifyBtn" type="button">Verify Now</button>
    </div>

    <div class="progress" id="tsvProgress">
      <div class="progress-top">
        <span class="progress-label" id="tsvProgressLabel">Scanning</span>
        <span class="progress-pct" id="tsvProgressPct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="tsvProgressFill"></div></div>
      <div class="progress-status" id="tsvProgressStatus">Analyzing image</div>
    </div>

    <div class="result" id="tsvResult"></div>
  </div>

  <div class="footer">Powered by <a href="https://timesnap.info">TIMESNAP.INFO</a></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
(function() {
  const firebaseConfig = {
    apiKey: "AIzaSyAP5_okpPwM-O1Onp8W0U9gJt4V1K8I4T8",
    authDomain: "timesnap-guardian.firebaseapp.com",
    projectId: "timesnap-guardian",
    storageBucket: "timesnap-guardian.firebasestorage.app",
    messagingSenderId: "1022815149876",
    appId: "1:1022815149876:web:67582e36a34b47e9170f61"
  };
  if (typeof firebase === 'undefined') { console.error('Firebase not loaded'); return; }
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const themeBtn = document.getElementById('themeBtn');
  const saved = localStorage.getItem('tsvTheme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  themeBtn.textContent = saved === 'dark' ? '☀️' : '🌙';
  themeBtn.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const nxt = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', nxt);
    localStorage.setItem('tsvTheme', nxt);
    themeBtn.textContent = nxt === 'dark' ? '☀️' : '🌙';
  });

  const tabs = document.querySelectorAll('.tab');
  const panels = document.querySelectorAll('.panel');
  const codeInput = document.getElementById('tsvCode');
  const verifyBtn = document.getElementById('tsvVerifyBtn');
  const fileInput = document.getElementById('tsvFile');
  const dropZone = document.getElementById('tsvDrop');
  const progress = document.getElementById('tsvProgress');
  const progressPct = document.getElementById('tsvProgressPct');
  const progressFill = document.getElementById('tsvProgressFill');
  const progressStatus = document.getElementById('tsvProgressStatus');
  const resultDiv = document.getElementById('tsvResult');

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      panels.forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      resultDiv.classList.remove('show');
    });
  });

  function setProgress(pct, status) {
    progress.classList.add('active');
    progressFill.style.width = pct + '%';
    progressPct.textContent = Math.round(pct) + '%';
    if (status) progressStatus.textContent = status;
  }
  function hideProgress() {
    progress.classList.remove('active');
    progressFill.style.width = '0%';
  }

  function renderResult(type, iconChar, title, msg, imageUrl, code, data) {
    let html = '';
    if (imageUrl) html += '<div class="preview"><img src="' + imageUrl + '" alt="" /></div>';
    html += '<div class="verdict ' + type + '"><div class="verdict-icon">' + iconChar + '</div><div><div class="verdict-title">' + title + '</div><div class="verdict-msg">' + msg + '</div></div></div>';

    if (data) {
      const ts = data.timestamp.toDate();
      const dateStr = ts.toLocaleDateString('en-GB', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
      const timeStr = ts.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
      const source = data.timeSource === 'internet' ? 'NTP Verified' : 'Device Clock';
      const coords = (data.latitude && data.longitude) ? data.latitude.toFixed(5) + ', ' + data.longitude.toFixed(5) : 'N/A';
      const media = data.mediaType === 'video' ? 'Video' : 'Photo';

      html += '<div class="details-title">Capture Details</div><div class="grid">' +
        '<div class="cell"><div class="cell-label">Code</div><div class="cell-value">' + code + '</div></div>' +
        '<div class="cell"><div class="cell-label">Media Type</div><div class="cell-value">' + media + '</div></div>' +
        '<div class="cell"><div class="cell-label">Date</div><div class="cell-value">' + dateStr + '</div></div>' +
        '<div class="cell"><div class="cell-label">Time</div><div class="cell-value">' + timeStr + '</div></div>' +
        '<div class="cell"><div class="cell-label">Time Source</div><div class="cell-value">' + source + '</div></div>' +
        '<div class="cell"><div class="cell-label">Coordinates</div><div class="cell-value">' + coords + '</div></div>' +
        '<div class="cell wide"><div class="cell-label">Location</div><div class="cell-value">' + (data.address || 'N/A') + '</div></div></div>';

      if (data.latitude && data.longitude) {
        const mapUrl = 'https://www.openstreetmap.org/export/embed.html?bbox=' +
          (data.longitude - 0.005) + ',' + (data.latitude - 0.003) + ',' +
          (data.longitude + 0.005) + ',' + (data.latitude + 0.003) +
          '&layer=mapnik&marker=' + data.latitude + ',' + data.longitude;
        html += '<div class="map"><iframe src="' + mapUrl + '" loading="lazy"></iframe></div>';
      }

      if (data.timeSource !== 'internet') {
        html += '<div class="warning-box"><strong>⚠ TAMPERING WARNING</strong>This photo was captured while offline. Device clock can be manually changed. Treat with caution.</div>';
      }
    }

    resultDiv.innerHTML = html;
    resultDiv.classList.add('show');
    resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  async function verifyCode(code, imageUrl) {
    try {
      const doc = await db.collection('verifications').doc(code).get();
      if (!doc.exists) {
        renderResult('error', '✕', 'Code Not Found',
          'This verification code was not found in our database.', imageUrl, code, null);
        hideProgress();
        return;
      }
      const data = doc.data();
      if (data.timeSource === 'internet') {
        renderResult('success', '✓', 'Verified Authentic',
          'This TimeSnap was captured with verified internet time. All metadata is trustworthy.',
          imageUrl, code, data);
      } else {
        renderResult('warning', '⚠', 'Possibly Tampered',
          'This photo was saved with device-clock time instead of verified internet time.',
          imageUrl, code, data);
      }
      hideProgress();
    } catch (err) {
      renderResult('error', '✕', 'Verification Failed', err.message, imageUrl, code, null);
      hideProgress();
    }
  }

  // ===== IMAGE PREPROCESSING =====
  // Convert to grayscale, boost contrast, apply threshold — makes OCR way more reliable
  function preprocessCanvas(canvas) {
    const ctx = canvas.getContext('2d');
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const d = imgData.data;

    // Step 1: grayscale + contrast boost
    for (let i = 0; i < d.length; i += 4) {
      const gray = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
      // Increase contrast: pixels below 128 get darker, above get lighter
      const boosted = gray < 100 ? Math.max(0, gray - 40) :
                      gray > 155 ? Math.min(255, gray + 40) : gray;
      d[i] = d[i+1] = d[i+2] = boosted;
    }

    ctx.putImageData(imgData, 0, 0);
    return canvas;
  }

  // Extract a region of the image, apply rotation, scale up, preprocess
  function extractRegion(img, sx, sy, sw, sh, rotate, preprocess) {
    const scale = Math.max(2, 1800 / Math.max(sw, sh));
    const outW = Math.round(sw * scale);
    const outH = Math.round(sh * scale);

    const c = document.createElement('canvas');
    const cx = c.getContext('2d');

    if (rotate === 0) {
      c.width = outW; c.height = outH;
      cx.drawImage(img, sx, sy, sw, sh, 0, 0, outW, outH);
    } else if (rotate === 90 || rotate === 270) {
      c.width = outH; c.height = outW;
      cx.save();
      cx.translate(c.width / 2, c.height / 2);
      cx.rotate(rotate * Math.PI / 180);
      cx.drawImage(img, sx, sy, sw, sh, -outW/2, -outH/2, outW, outH);
      cx.restore();
    } else {
      c.width = outW; c.height = outH;
      cx.save();
      cx.translate(c.width/2, c.height/2);
      cx.rotate(Math.PI);
      cx.drawImage(img, sx, sy, sw, sh, -outW/2, -outH/2, outW, outH);
      cx.restore();
    }

    if (preprocess) preprocessCanvas(c);
    return c;
  }

  // Build all scanning strategies — code could be anywhere at any rotation
  function buildStrategies(img) {
    const W = img.width, H = img.height;
    return [
      // LEFT edge (vertical text — needs 90° rotation to read horizontally)
      // Original code is at left edge going bottom-to-top → rotate 90° CCW = 270 in canvas
      { name: 'left edge rotated', sx: 0, sy: 0, sw: W * 0.15, sh: H, rotate: 270, preprocess: true },
      { name: 'left edge rotated raw', sx: 0, sy: 0, sw: W * 0.15, sh: H, rotate: 270, preprocess: false },
      { name: 'left edge cw', sx: 0, sy: 0, sw: W * 0.15, sh: H, rotate: 90, preprocess: true },
      { name: 'left edge wider', sx: 0, sy: 0, sw: W * 0.25, sh: H, rotate: 270, preprocess: true },

      // RIGHT edge (in case photo is flipped)
      { name: 'right edge rotated', sx: W * 0.85, sy: 0, sw: W * 0.15, sh: H, rotate: 90, preprocess: true },
      { name: 'right edge rotated raw', sx: W * 0.85, sy: 0, sw: W * 0.15, sh: H, rotate: 270, preprocess: true },

      // BOTTOM edge
      { name: 'bottom edge', sx: 0, sy: H * 0.85, sw: W, sh: H * 0.15, rotate: 0, preprocess: true },
      { name: 'bottom edge left', sx: 0, sy: H * 0.85, sw: W * 0.5, sh: H * 0.15, rotate: 0, preprocess: true },

      // TOP edge
      { name: 'top edge', sx: 0, sy: 0, sw: W, sh: H * 0.15, rotate: 180, preprocess: true },

      // FULL image at all rotations as fallback
      { name: 'full', sx: 0, sy: 0, sw: W, sh: H, rotate: 0, preprocess: false },
      { name: 'full rotated', sx: 0, sy: 0, sw: W, sh: H, rotate: 90, preprocess: false },
      { name: 'full flipped', sx: 0, sy: 0, sw: W, sh: H, rotate: 180, preprocess: false }
    ];
  }

  // Smart code extraction with OCR error correction
  function extractCode(text) {
    const cleaned = text.toUpperCase().replace(/\s+/g, ' ');

    // Direct match TS-XXXXXXX
    let match = cleaned.match(/TS[\-\s]*([A-Z0-9]{7})/);
    if (match) return 'TS-' + match[1];

    // Handle common OCR errors: T could be 7 or 1, S could be 5 or B
    // Try patterns like "T5-XXXXXXX", "75-XXXXXXX", "IS-XXXXXXX"
    match = cleaned.match(/[T7I][S5B][\-\s]*([A-Z0-9]{7})/);
    if (match) {
      const candidate = 'TS-' + match[1];
      if (candidate.match(/^TS-[A-Z0-9]{7}$/)) return candidate;
    }

    // Try to find a 7-char alphanumeric block preceded by a dash or space
    match = cleaned.match(/[\-\s]([A-Z0-9]{7})[\s\.\,\)]/);
    if (match && match[1].match(/^[A-Z0-9]{7}$/) && /\d/.test(match[1]) && /[A-Z]/.test(match[1])) {
      return 'TS-' + match[1];
    }

    return null;
  }

  async function runOCR(canvas) {
    try {
      const result = await Tesseract.recognize(canvas, 'eng', {
        logger: () => {},
        tessedit_char_whitelist: 'TSABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-',
        tessedit_pageseg_mode: 6 // Assume uniform block of text
      });
      return result.data.text || '';
    } catch (e) {
      return '';
    }
  }

  async function scanImage(file) {
    setProgress(3, 'Loading image');
    const imageUrl = URL.createObjectURL(file);

    const img = await new Promise((resolve, reject) => {
      const image = new Image();
      image.onload = () => resolve(image);
      image.onerror = reject;
      image.src = imageUrl;
    });

    setProgress(8, 'Analyzing image structure');
    const strategies = buildStrategies(img);

    let foundCode = null;
    for (let i = 0; i < strategies.length; i++) {
      if (foundCode) break;
      const s = strategies[i];
      const pct = 8 + ((i + 1) / strategies.length) * 88;
      setProgress(pct, 'Scanning ' + s.name);

      try {
        const canvas = extractRegion(img, s.sx, s.sy, s.sw, s.sh, s.rotate, s.preprocess);
        const text = await runOCR(canvas);
        const code = extractCode(text);
        if (code) {
          foundCode = code;
          break;
        }
      } catch (e) {}
    }

    if (foundCode) {
      setProgress(100, 'Code detected: ' + foundCode);
      codeInput.value = foundCode;
      await new Promise(r => setTimeout(r, 300));
      await verifyCode(foundCode, imageUrl);
    } else {
      hideProgress();
      renderResult('error', '?', 'Code Not Recognized',
        'We could not detect a TimeSnap code in this image. The photo might be tampered with, cropped, low quality, or was not created with TimeSnap. Try entering the code manually.',
        imageUrl, null, null);
    }
  }

  verifyBtn.addEventListener('click', async () => {
    const code = codeInput.value.trim().toUpperCase();
    if (!code.match(/^TS-[A-Z0-9]{7}$/)) {
      renderResult('error', '✕', 'Invalid Format',
        'Codes must be in the format TS-XXXXXXX (7 characters after TS-).', null, null, null);
      return;
    }
    verifyBtn.disabled = true;
    verifyBtn.textContent = 'Verifying';
    setProgress(50, 'Checking database');
    await verifyCode(code, null);
    verifyBtn.disabled = false;
    verifyBtn.textContent = 'Verify Now';
  });

  codeInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') verifyBtn.click();
  });

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) scanImage(file).finally(() => { fileInput.value = ''; });
  });

  ['dragenter', 'dragover'].forEach(ev => {
    dropZone.addEventListener(ev, (e) => { e.preventDefault(); dropZone.classList.add('drag'); });
  });
  ['dragleave', 'drop'].forEach(ev => {
    dropZone.addEventListener(ev, (e) => { e.preventDefault(); dropZone.classList.remove('drag'); });
  });
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) scanImage(file);
  });
})();
</script>

</body>
</html>
